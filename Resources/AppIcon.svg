<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"/>
    </clipPath>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0B1F5C"/>
      <stop offset="50%"  style="stop-color:#1256D6"/>
      <stop offset="100%" style="stop-color:#00C8DC"/>
    </linearGradient>

    <radialGradient id="bloom" cx="30%" cy="22%" r="58%">
      <stop offset="0%"   style="stop-color:#62D8FF;stop-opacity:0.40"/>
      <stop offset="100%" style="stop-color:#0B1F5C;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="vignette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.30"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:1.0"/>
      <stop offset="100%" style="stop-color:#B8EEFF;stop-opacity:0.80"/>
    </linearGradient>

    <filter id="barGlow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="specular" cx="22%" cy="10%" r="40%">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bloom)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#vignette)"/>

    <g filter="url(#barGlow)">
      <rect x="198" y="442" width="52" height="140" rx="26" fill="url(#barGrad)" opacity="0.55"/>
      <rect x="294" y="382" width="52" height="260" rx="26" fill="url(#barGrad)" opacity="0.70"/>
      <rect x="390" y="322" width="52" height="380" rx="26" fill="url(#barGrad)" opacity="0.88"/>
      <rect x="486" y="272" width="52" height="480" rx="26" fill="url(#barGrad)" opacity="1.00"/>
      <rect x="582" y="322" width="52" height="380" rx="26" fill="url(#barGrad)" opacity="0.88"/>
      <rect x="678" y="382" width="52" height="260" rx="26" fill="url(#barGrad)" opacity="0.70"/>
      <rect x="774" y="442" width="52" height="140" rx="26" fill="url(#barGrad)" opacity="0.55"/>
    </g>

    <rect x="0" y="0" width="1024" height="1024" fill="url(#specular)"/>
  </g>
</svg>
